<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정산내역 조회 가이드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  font-size: 13px;
  color: #222;
  background: #fff;
  height: 100vh;
  overflow: hidden;
}
.layout {
  display: flex;
  height: 100vh;
}

/* 왼쪽 목록 */
.side-list {
  width: 200px;
  flex-shrink: 0;
  border-right: 1px solid #E4E6E8;
  overflow-y: auto;
  background: #F8F9FA;
}
.side-cat-label {
  padding: 8px 14px 6px;
  font-size: 11px;
  font-weight: 700;
  color: #AAB0BA;
  letter-spacing: 0.4px;
  background: #F0F2F5;
  border-bottom: 1px solid #E4E6E8;
  border-top: 1px solid #E4E6E8;
  margin-top: 4px;
}
.side-cat-label:first-child { margin-top: 0; border-top: none; }
.side-item {
  padding: 9px 14px;
  border-bottom: 1px solid #ECEDF0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 500;
  color: #444;
  line-height: 1.4;
}
.side-item:hover { background: #ECEDF0; }
.side-item.active {
  background: #EEF3FC;
  color: #1470B4;
  font-weight: 700;
  border-left: 2px solid #1470B4;
  padding-left: 12px;
}
.side-item .arr { font-size: 10px; color: #CCC; flex-shrink: 0; margin-left: 4px; }
.side-item.active .arr { color: #1470B4; }

/* 오른쪽 상세 */
.side-detail {
  flex: 1;
  overflow-y: auto;
  padding: 24px 24px 40px;
}
.sd-name {
  font-size: 18px;
  font-weight: 700;
  color: #111;
  margin-bottom: 10px;
}
.sd-desc {
  font-size: 13px;
  color: #555;
  line-height: 1.75;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid #F0F2F5;
}
.sd-sub-title {
  font-size: 11px;
  font-weight: 700;
  color: #AAB0BA;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.sd-sub-item {
  padding: 10px 0;
  border-bottom: 1px solid #F0F2F5;
}
.sd-sub-item:last-child { border-bottom: none; }
.sd-sub-name {
  font-size: 13px;
  font-weight: 600;
  color: #333;
  margin-bottom: 3px;
}
.sd-sub-desc {
  font-size: 12px;
  color: #888;
  line-height: 1.55;
}
.no-sub {
  font-size: 13px;
  color: #AAB0BA;
  font-style: italic;
}
</style>
</head>
<body>
<div class="layout">

  <!-- 왼쪽 목록 -->
  <div class="side-list">
    <div class="side-cat-label">(A) 주문중개</div>
    <div class="side-item active" onclick="show('jm',this)">주문금액 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('cl',this)">중개이용료 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('hl',this)">고객할인비용 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('sm',this)">소액주문비 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('bf',this)">부분환불금액 <span class="arr">›</span></div>
    <div class="side-cat-label">(B) 배달</div>
    <div class="side-item" onclick="show('db',this)">배달비 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('dt',this)">배달팁 할인비용 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('gd',this)">가게배달팁 <span class="arr">›</span></div>
    <div class="side-cat-label">(C) 그 외</div>
    <div class="side-item" onclick="show('rp',this)">결제정산수수료 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('mc',this)">만나서결제금액 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('cup',this)">일회용컵보증금액 <span class="arr">›</span></div>
    <div class="side-cat-label">(D) 부가세</div>
    <div class="side-item" onclick="show('vat',this)">부가세 <span class="arr">›</span></div>
    <div class="side-cat-label">기타</div>
    <div class="side-item" onclick="show('ad',this)">광고비 지원 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('aj',this)">조정금액 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('cr',this)">보정금액 <span class="arr">›</span></div>
    <div class="side-item" onclick="show('ck',this)">우리가게클릭 <span class="arr">›</span></div>
  </div>

  <!-- 오른쪽 상세 -->
  <div class="side-detail" id="detail">
    <div class="sd-name" id="sd-name">주문금액</div>
    <div class="sd-desc" id="sd-desc">고객이 주문한 음식값으로, 이 금액을 기준으로 중개이용료 등이 계산됩니다.</div>
    <div class="sd-sub-title" id="sd-sub-title">세부 항목</div>
    <div id="sd-sub-list"></div>
  </div>

</div>

function show(key, el) {
  const d = data[key];
  document.getElementById('sd-name').textContent = d.name;
  document.getElementById('sd-desc').textContent = d.desc;

  const subTitle = document.getElementById('sd-sub-title');
  const subList = document.getElementById('sd-sub-list');

  if (d.subs.length > 0) {
    subTitle.style.display = '';
    subList.innerHTML = d.subs.map(([n, desc]) =>
      `<div class="sd-sub-item"><div class="sd-sub-name">${n}</div><div class="sd-sub-desc">${desc}</div></div>`
    ).join('');
  } else {
    subTitle.style.display = 'none';
    subList.innerHTML = '<div class="no-sub">별도 세부 항목 없음</div>';
  }

  document.querySelectorAll('.side-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');

  document.getElementById('detail').scrollTop = 0;
}

// 초기 로드
show('jm', document.querySelector('.side-item'));

</body>
</html>
